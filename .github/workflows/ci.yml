name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/npm-publish.yml'
      - '.github/workflows/tri-review.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate BAML client
        run: npx baml-cli generate

      - name: Verify code
        run: npm run verify

      - name: Run tests
        run: npm run test

      - name: Build package
        run: npm run build
